name: Registry CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: registry-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality checks
        run: bun run check

      - name: Build registry artifacts
        run: bun run registry:build

      - name: Verify generated artifacts are current
        shell: bash
        run: |
          changes="$(git status --porcelain=v1 --untracked-files=all -- public/r)"
          if [[ -n "${changes}" ]]; then
            printf '%s\n' "${changes}"
            exit 1
          fi
